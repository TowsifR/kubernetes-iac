# Grafana UI — http://grafana.localtest.me  (admin / admin)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.localtest.me`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
---
# Prometheus UI — http://prometheus.localtest.me
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prometheus.localtest.me`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
# Alertmanager UI — http://alertmanager.localtest.me
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`alertmanager.localtest.me`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
