apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: sandbox
spec:
  compositeTypeRef:
    apiVersion: platform.example.io/v1alpha1
    kind: XSandbox
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            import json

            oxr = option("params").oxr
            _dxr = option("params").dxr

            owner = oxr.spec.owner
            size = oxr.spec.size or "small"
            persona = oxr.spec.persona or ""

            # The governed flavor catalog (config-as-data): a persona picks the image and a locked-down
            # OpenCode config the sandboxed user can't override. `permission` gates its tools — the guardrail.
            _personas = {
                builder = {
                    image = "sandbox-opencode:dev"
                    model = "opencode/deepseek-v4-flash-free"
                    permission = {edit = "allow", bash = "allow", webfetch = "allow", websearch = "allow"}
                    prompt = "# Builder\nYou are a pragmatic software engineer in a fresh, empty sandbox. You build small, self-contained programs from a short brief and run them to prove they work.\n\n## Method\n- Restate the goal in one line, then implement the simplest thing that works.\n- Write real, runnable files; python and node are both installed. Prefer the standard library.\n- Run what you write, show the output, and fix what breaks.\n- Keep it to a handful of files; no frameworks or network services unless asked.\n\n## Output\nThe working files, plus one line on how to run it and what it produced.\n"
                }
                architect = {
                    image = "sandbox-opencode:dev"
                    model = "opencode/deepseek-v4-flash-free"
                    permission = {edit = "allow", bash = "deny", webfetch = "allow", websearch = "allow"}
                    prompt = "# Architect\nYou are a software architect in a fresh sandbox. You turn a short brief into a clear system design. You do not write application code or run commands; you produce the design others build from.\n\n## Method\n- State the problem, the key requirements, and the main constraints in a few lines.\n- Propose a design: the components, how they interact, the data flow, and the trade-offs.\n- Draw it as a fenced Mermaid diagram (```mermaid) so it renders anywhere.\n- Call out what you left out and what you would revisit at scale.\n\n## Output\nA single design.md: overview, the Mermaid diagram, components, data flow, trade-offs.\n"
                }
            }

            # With a persona we use its catalog entry; without one, the raw image (as today).
            _has_persona = persona in _personas
            _p = _personas[persona] if _has_persona else {image = oxr.spec.image or "busybox:1.36", model = "", permission = {}, prompt = ""}
            image = _p.image

            # OpenCode reads /etc/opencode/opencode.json as managed config (highest precedence, non-overridable).
            _opencode_cfg = {"$schema" = "https://opencode.ai/config.json", model = _p.model, permission = _p.permission, instructions = ["/etc/opencode/persona.md"]}
            _mounts = [{name = "opencode-config", mountPath = "/etc/opencode", readOnly = True}] if _has_persona else []
            _volumes = [{name = "opencode-config", configMap = {name = "opencode-config"}}] if _has_persona else []

            # Identity = the claim name (unique per claim), so one owner can hold many
            # sandboxes. Falls back to the XR name if created without a claim.
            _labels = oxr.metadata.labels or {}
            name = _labels["crossplane.io/claim-name"] if "crossplane.io/claim-name" in _labels else oxr.metadata.name
            ns = "sandbox-" + name

            # Tier → namespace-wide caps. The LimitRange (per-container ceiling) stays fixed.
            _quota = {
                small = {"pods" = "5",  "requests.cpu" = "1", "requests.memory" = "1Gi", "limits.cpu" = "2", "limits.memory" = "2Gi"}
                medium = {"pods" = "10", "requests.cpu" = "2", "requests.memory" = "2Gi", "limits.cpu" = "4", "limits.memory" = "4Gi"}
                large = {"pods" = "20", "requests.cpu" = "4", "requests.memory" = "4Gi", "limits.cpu" = "8", "limits.memory" = "8Gi"}
            }[size]

            _sandbox_labels = {
                "platform.example.io/owner" = owner
                "platform.example.io/sandbox" = name
            }

            # The persona's OpenCode config, delivered as a ConfigMap the pod mounts.
            _configmap = [{name = "opencode-config", manifest = {
                apiVersion = "v1"
                kind = "ConfigMap"
                metadata = {name = "opencode-config", namespace = ns}
                data = {"opencode.json" = json.encode(_opencode_cfg), "persona.md" = _p.prompt}
            }}] if _has_persona else []

            # The k8s objects to provision for each sandbox (plain manifests).
            _resources = [
                {name = "namespace", manifest = {
                    apiVersion = "v1"
                    kind = "Namespace"
                    metadata = {name = ns, labels = _sandbox_labels}
                }}
                {name = "quota", manifest = {
                    apiVersion = "v1"
                    kind = "ResourceQuota"
                    metadata = {name = "sandbox", namespace = ns}
                    spec.hard = _quota
                }}
                {name = "limits", manifest = {
                    apiVersion = "v1"
                    kind = "LimitRange"
                    metadata = {name = "sandbox", namespace = ns}
                    spec.limits = [{
                        type = "Container"
                        default = {cpu = "500m", memory = "512Mi"}
                        defaultRequest = {cpu = "100m", memory = "128Mi"}
                        max = {cpu = "1", memory = "1Gi"}
                    }]
                }}
                {name = "network-policy", manifest = {
                    apiVersion = "networking.k8s.io/v1"
                    kind = "NetworkPolicy"
                    metadata = {name = "default-deny-ingress", namespace = ns}
                    spec = {podSelector = {}, policyTypes = ["Ingress"]}
                }}
                {name = "terminal-binding", manifest = {
                    apiVersion = "rbac.authorization.k8s.io/v1"
                    kind = "RoleBinding"
                    metadata = {name = "sandbox-terminal", namespace = ns}
                    # Scopes the cluster-wide ClusterRole *definition* to this namespace alone, so the
                    # control plane can exec into sandboxes and nothing else. Dies with the namespace.
                    roleRef = {apiGroup = "rbac.authorization.k8s.io", kind = "ClusterRole", name = "sandbox-terminal"}
                    # The platform names the control plane's identity — the one seam between the two repos.
                    subjects = [{kind = "ServiceAccount", name = "sandbox-control-plane", namespace = "sandbox-system"}]
                }}
                {name = "sandbox", manifest = {
                    apiVersion = "agents.x-k8s.io/v1beta1"
                    kind = "Sandbox"
                    metadata = {name = "sandbox", namespace = ns}
                    # Label the pod too, not just the namespace — it's how the control plane finds it.
                    spec.podTemplate.metadata.labels = _sandbox_labels
                    spec.podTemplate.spec.containers = [{
                        name = "main"
                        image = image
                        command = ["sleep", "infinity"]
                        # The Zen key, synced here by the ClusterExternalSecret. Required, not optional:
                        # the pod waits for ESO rather than starting without a key (env is fixed at start).
                        env = [{
                            name = "OPENCODE_API_KEY"
                            valueFrom.secretKeyRef = {name = "opencode-zen", key = "key"}
                        }]
                        volumeMounts = _mounts
                    }]
                    spec.podTemplate.spec.volumes = _volumes
                }}
            ]

            # Report where it landed (readiness is the standard Ready condition, set by the ready step).
            _dxr.status = {namespace = ns}

            # Wrap each manifest in a provider-kubernetes Object (written once); return the XR too.
            items = [_dxr] + [{
                apiVersion = "kubernetes.crossplane.io/v1alpha2"
                kind = "Object"
                metadata.annotations = {"krm.kcl.dev/composition-resource-name" = r.name}
                spec.forProvider.manifest = r.manifest
                spec.providerConfigRef.name = "kubernetes-provider"
            } for r in _resources + _configmap]
    - step: ready
      functionRef:
        name: function-auto-ready
