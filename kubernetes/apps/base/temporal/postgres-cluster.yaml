apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgresql
  namespace: temporal
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      # postInitSQL (superuser) adds the second, visibility database
      postInitSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal;
