apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell
  namespace: openshell
spec:
  interval: 30m
  chart:
    spec:
      chart: helm-chart
      version: "0.0.69"
      sourceRef:
        kind: HelmRepository
        name: openshell
        namespace: openshell
      interval: 12h
  values:
    server:
      auth:
        allowUnauthenticatedUsers: true # local dev only
