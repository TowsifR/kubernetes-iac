apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: temporal
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 15m # first run waits for CNPG to provision Postgres
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/base/temporal
  prune: true
  dependsOn:
    - name: cloudnative-pg # provisions the Postgres Cluster
    - name: traefik # the IngressRoute CRD
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: temporal
      namespace: temporal
