apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: sandbox
spec:
  compositeTypeRef:
    apiVersion: platform.example.io/v1alpha1
    kind: XSandbox
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          source: |
            oxr = option("params").oxr
            _dxr = option("params").dxr

            owner = oxr.spec.owner
            size = oxr.spec.size or "small"
            image = oxr.spec.image or "busybox:1.36"

            # Identity = the claim name (unique per claim), so one owner can hold many
            # sandboxes. Falls back to the XR name if created without a claim.
            _labels = oxr.metadata.labels or {}
            name = _labels["crossplane.io/claim-name"] if "crossplane.io/claim-name" in _labels else oxr.metadata.name
            ns = "sandbox-" + name

            # Tier → namespace-wide caps. The LimitRange (per-container ceiling) stays fixed.
            _quota = {
                small = {"pods" = "5",  "requests.cpu" = "1", "requests.memory" = "1Gi", "limits.cpu" = "2", "limits.memory" = "2Gi"}
                medium = {"pods" = "10", "requests.cpu" = "2", "requests.memory" = "2Gi", "limits.cpu" = "4", "limits.memory" = "4Gi"}
                large = {"pods" = "20", "requests.cpu" = "4", "requests.memory" = "4Gi", "limits.cpu" = "8", "limits.memory" = "8Gi"}
            }[size]

            _sandbox_labels = {
                "platform.example.io/owner" = owner
                "platform.example.io/sandbox" = name
            }

            # The k8s objects to provision for each sandbox (plain manifests).
            _resources = [
                {name = "namespace", manifest = {
                    apiVersion = "v1"
                    kind = "Namespace"
                    metadata = {name = ns, labels = _sandbox_labels}
                }}
                {name = "quota", manifest = {
                    apiVersion = "v1"
                    kind = "ResourceQuota"
                    metadata = {name = "sandbox", namespace = ns}
                    spec.hard = _quota
                }}
                {name = "limits", manifest = {
                    apiVersion = "v1"
                    kind = "LimitRange"
                    metadata = {name = "sandbox", namespace = ns}
                    spec.limits = [{
                        type = "Container"
                        default = {cpu = "500m", memory = "512Mi"}
                        defaultRequest = {cpu = "100m", memory = "128Mi"}
                        max = {cpu = "1", memory = "1Gi"}
                    }]
                }}
                {name = "network-policy", manifest = {
                    apiVersion = "networking.k8s.io/v1"
                    kind = "NetworkPolicy"
                    metadata = {name = "default-deny-ingress", namespace = ns}
                    spec = {podSelector = {}, policyTypes = ["Ingress"]}
                }}
                {name = "sandbox", manifest = {
                    apiVersion = "agents.x-k8s.io/v1beta1"
                    kind = "Sandbox"
                    metadata = {name = "sandbox", namespace = ns}
                    spec.podTemplate.spec.containers = [{
                        name = "main"
                        image = image
                        command = ["sleep", "infinity"]
                    }]
                }}
            ]

            # Report where it landed (readiness is the standard Ready condition, set by the ready step).
            _dxr.status = {namespace = ns}

            # Wrap each manifest in a provider-kubernetes Object (written once); return the XR too.
            items = [_dxr] + [{
                apiVersion = "kubernetes.crossplane.io/v1alpha2"
                kind = "Object"
                metadata.annotations = {"krm.kcl.dev/composition-resource-name" = r.name}
                spec.forProvider.manifest = r.manifest
                spec.providerConfigRef.name = "kubernetes-provider"
            } for r in _resources]
    - step: ready
      functionRef:
        name: function-auto-ready
