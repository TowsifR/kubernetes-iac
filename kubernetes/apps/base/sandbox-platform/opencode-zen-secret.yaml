# Syncs the OpenCode Zen key from LocalStack into every sandbox namespace (value never in git).
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: opencode-zen
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: platform.example.io/sandbox
          operator: Exists
  refreshTime: 1h
  externalSecretSpec:
    secretStoreRef:
      name: localstack-secretsmanager
      kind: ClusterSecretStore
    target:
      name: opencode-zen
      creationPolicy: Owner
    data:
      - secretKey: key
        remoteRef:
          key: opencode-zen-key
