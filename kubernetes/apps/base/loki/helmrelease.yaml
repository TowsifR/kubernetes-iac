apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: logging
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: "6.x" # Loki 3.x
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: logging
      interval: 12h
  values:
    fullnameOverride: loki # service becomes loki.logging.svc:3100
    deploymentMode: SingleBinary # one pod (single-node dev)

    loki:
      auth_enabled: false # no multi-tenancy locally
      commonConfig:
        replication_factor: 1 # required: default of 3 won't start with one instance
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-chunks
          admin: loki-chunks
        s3:
          endpoint: localstack.localstack.svc.cluster.local:4566
          region: us-east-1
          s3ForcePathStyle: true # path-style URLs (LocalStack)
          insecure: true # http, not https

      # AWS creds: mounted shared-credentials file, not inline keys
      extraEnv:
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /etc/aws/credentials
      extraVolumes:
        - name: aws-credentials
          secret:
            secretName: aws-credentials
      extraVolumeMounts:
        - name: aws-credentials
          mountPath: /etc/aws
          readOnly: true

    singleBinary:
      replicas: 1
      persistence:
        enabled: true # PVC at /var/loki via KinD's default local-path StorageClass
        size: 5Gi

    # SingleBinary doesn't auto-zero these; chart rejects install if both modes > 0
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Trim everything not needed for local dev.
    gateway:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    minio:
      enabled: false
