apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sandbox-platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/base/sandbox-platform
  prune: true
  dependsOn:
    - name: crossplane-provider-kubernetes
    - name: agent-sandbox # the Sandbox CRD the Composition creates
  wait: true
