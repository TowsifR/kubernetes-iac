apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "40.x"        # Traefik v3 (fleet-infra pins 25.x/v2.10; we mirror the pattern on a current chart)
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h
  install:
    createNamespace: false   # namespace.yaml handles this
  values:
    deployment:
      replicas: 1            # 1 replica is sufficient for local KinD (fleet-infra uses 2 for HA)

    # KinD: NodePort uses the existing port mappings in the KinD Terraform module:
    #   container_port 30080 → host_port 80  (web/HTTP)
    #   container_port 30443 → host_port 443 (websecure/HTTPS)
    service:
      spec:
        type: NodePort   # chart v3 nests service type under service.spec (was service.type in v2 charts)

    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
